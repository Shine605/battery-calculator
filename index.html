<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>电池供需计算器</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 微软雅黑; 
            padding: 56px 28px;
            background: #f5f5f5;
            font-size: 25px;
        }
        .box { 
            background: #fff; 
            padding: 49px;
            border-radius: 14px; 
            max-width: 1260px;
            margin: 0 auto; 
        }
        h3 { font-size: 34px; margin: 0 0 21px 0; }
        .item { margin: 25px 0; }
        label { display: inline-block; width: 252px; font-size: 25px; }
        input { 
            padding: 13px; width: 150px; font-size: 25px; 
            border-radius: 6px; border: 1px solid #ccc;
        }
        .input-tip { font-size: 25px; margin-left: 8px; color: #666; }

        .input-spinner {
            position: relative;
            display: inline-block;
        }
        .input-spinner input {
            width: 150px;
            padding: 13px 32px 13px 13px;
            font-size: 25px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }
        .spinner-btns {
            position: absolute;
            right: 2px;
            top: 0;
            bottom: 0;
            display: none;
            flex-direction: column;
            justify-content: center;
        }
        .input-spinner:hover .spinner-btns { display: flex; }
        .spinner-btns button {
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 18px;
            color: #999;
            padding: 0 3px;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .spinner-btns button:hover { color: #555; }

        .switch-bar { margin: 28px 0; }
        .switch-bar h4 { margin: 14px 0; font-size: 25px; }
        .switch-btns { display: flex; gap: 14px; flex-wrap: wrap; }
        .switch-btn {
            padding: 13px 22px; border: none; border-radius: 6px;
            background: #409eff; color: #fff; cursor: pointer; font-size: 22px;
        }
        .switch-btn.off { background: #cccccc; cursor: not-allowed; }
        .step-bar { margin: 20px 0; display: flex; align-items: center; gap: 16px; }
        .step-btn {
            width: 48px; height: 48px; font-size: 24px;
            border: none; border-radius: 8px; background: #409eff; color: #fff; cursor: pointer;
        }
        .step-btn:disabled {
            background: #ccc !important; color: #999 !important;
            cursor: not-allowed !important; pointer-events: none !important;
        }
        .step-text { font-size: 26px; font-weight: bold; }
        .formula { background: #eef6ff; padding: 17px; border-radius: 7px; margin: 28px 0; font-size: 28px; font-weight: bold; }
        .manual-formula { background: #eef6ff; padding: 17px; border-radius: 7px; margin: 0 0 20px 0; font-size: 28px; font-weight: bold; }
        .manual-step { font-size: 26px; font-weight: bold; margin-bottom: 20px; }
        .fold-btn {
            width: 100%; padding: 18px; margin: 28px 0;
            border: none; border-radius: 10px; background: #4caf84; color: #fff;
            font-size: 25px; cursor: pointer; font-family: 微软雅黑;
            transition: background 0.2s;
        }
        .fold-btn:hover { background: #3d9e6e; }
        .manual-wrap { display: none; }
        .rate-btns { margin: 28px 0 20px 0; display: flex; gap: 14px; flex-wrap: wrap; align-items: center; }
        .rate-btn, #backBtn, #resetBtn {
            padding: 14px 28px; font-size: 22px; cursor: pointer; border: none; border-radius: 7px;
            transition: background 0.2s;
        }
        .rate-btn { background: #409eff; color: #fff; }
        .rate-btn:hover { background: #3a8fd4; }
        #backBtn { background: #e6a23a; color: #fff; }
        #backBtn:hover { background: #d49530; }
        #resetBtn { background: #f56c6c; color: #fff; }
        #resetBtn:hover { background: #e06060; }
        .best { margin: 28px 0; padding: 28px; background: #f0fff4; border-radius: 8px; line-height: 2.5; font-size: 25px; }
        .res { margin-top: 21px; padding: 28px; background: #f8f9fa; border-radius: 8px; line-height: 2.5; font-size: 25px; }
        .warn { color: red; font-weight: bold; }
        .ok { color: green; font-weight: bold; }
        .gray { color: #aaa; }
        hr { border: 0; border-top: 1px solid #ddd; margin: 15px 0; }
    </style>
</head>
<body>
<div class="box">
    <h3>🔋 电池供需计算器</h3>
    <div class="item">
        <label>单节电池电量：</label>
        <input type="text" id="batCap" value="3200">
        <span class="input-tip">（功率值）</span>
    </div>
    <div class="item">
        <label>电池发电时间：</label>
        <input type="text" id="powerTime" value="40">
        <span class="input-tip">（秒）</span>
    </div>
    <div class="item">
        <label>传送带运输速度：</label>
        <input type="text" id="baseSec" value="2">
        <span class="input-tip">（秒/单位，可填分数如 40/3）</span>
    </div>
    <div class="item">
        <label>用电功率：</label>
        <span class="input-spinner">
            <input type="text" id="needPower" value="4800">
            <span class="spinner-btns">
                <button id="needUp" type="button">▲</button>
                <button id="needDown" type="button">▼</button>
            </span>
        </span>
        <span class="input-tip">（功率值）</span>
    </div>

    <div class="switch-bar">
        <h4>最优解可用倍率开关（关闭则不参与最优计算）</h4>
        <div class="switch-btns" id="switchBtns"></div>
    </div>

    <div class="step-bar">
        <button class="step-btn" id="stepMinus">-</button>
        <span class="step-text">当前步数：<span id="stepNum">0</span></span>
        <button class="step-btn" id="stepPlus">+</button>
    </div>

    <div class="formula">
        当前倍率公式：<span id="formulaText">1</span>
    </div>

    <div class="best" id="bestResult"></div>

    <button class="fold-btn" id="foldManualBtn">📐 展开手动计算</button>

    <div class="manual-wrap" id="manualWrap">
        <div class="manual-formula">当前计算公式：<span id="manualFormulaText">1</span></div>
        <div class="manual-step">当前步数：<span id="manualStepNum">0</span></div>

        <div class="rate-btns">
            <button class="rate-btn" data-val="0.5" data-name="1/2">1/2</button>
            <button class="rate-btn" data-val="0.333333" data-name="1/3">1/3</button>
            <button class="rate-btn" data-val="0.666666" data-name="2/3">2/3</button>
            <button class="rate-btn" data-val="0.75" data-name="3/4">3/4</button>
            <button class="rate-btn" data-val="0.375" data-name="3/8">3/8</button>
            <button class="rate-btn" data-val="0.625" data-name="5/8">5/8</button>
            <button class="rate-btn" data-val="0.833333" data-name="5/6">5/6</button>
            <button class="rate-btn" data-val="0.875" data-name="7/8">7/8</button>
            <button id="backBtn">↩️ 退格</button>
            <button id="resetBtn">🔄 重置</button>
        </div>
        <div class="res" id="result"></div>
    </div>
</div>

<script>
const rateList = [
    {name:"1/2", val:0.5, numerator:1, denominator:2},
    {name:"1/3", val:0.333333, numerator:1, denominator:3},
    {name:"2/3", val:0.666666, numerator:2, denominator:3},
    {name:"3/4", val:0.75, numerator:3, denominator:4},
    {name:"3/8", val:0.375, numerator:3, denominator:8},
    {name:"5/8", val:0.625, numerator:5, denominator:8},
    {name:"5/6", val:0.833333, numerator:5, denominator:6},
    {name:"7/8", val:0.875, numerator:7, denominator:8}
];

const gcd = (a, b) => b === 0 ? a : gcd(b, a % b);
const simplifyFraction = (n, d) => { const g = gcd(n,d); return { num: n/g, den: d/g }; };

let rateSwitch = Object.fromEntries(rateList.map(r => [r.name, true]));
let targetStep = 0;
let isManual = false;
const MAX_STEP = 10;
let allSolutions = [], globalBest = null, stepList = [0];
let fractionMap = new Map();

function parseInputValue(str) {
    if (!str) return 0;
    str = str.trim();
    if (str.includes('/')) {
        const parts = str.split('/');
        if (parts.length === 2) {
            const num = parseFloat(parts[0]);
            const den = parseFloat(parts[1]);
            if (!isNaN(num) && !isNaN(den) && den !== 0) return num / den;
        }
    }
    const val = parseFloat(str);
    return isNaN(val) ? 0 : val;
}

function getBaseFormula(names, enabledSet) {
    if (names.length === 0) return { formula: '1', totalVal: 1, steps: 0 };
    let n = 1, d = 1;
    for (const name of names) {
        const r = rateList.find(r => r.name === name);
        if (r) { n *= r.numerator; d *= r.denominator; }
    }
    const { num, den } = simplifyFraction(n, d);
    const val = num / den;
    const matched = rateList.find(r => r.numerator === num && r.denominator === den);
    if (matched && enabledSet.has(matched.name)) {
        return { formula: matched.name, totalVal: val, steps: 1 };
    } else {
        return { formula: names.join(' × '), totalVal: val, steps: names.length };
    }
}

function displayFormula(baseFormula) {
    return baseFormula === '1' ? '1' : `1 × ${baseFormula}`;
}

function getInputs() {
    const batCap = parseInputValue(document.getElementById('batCap').value);
    const powerTime = parseInputValue(document.getElementById('powerTime').value);
    const baseSec = parseInputValue(document.getElementById('baseSec').value);
    const needPower = parseInputValue(document.getElementById('needPower').value);
    const realNeed = needPower - 200;
    const enabledRates = rateList.filter(r => rateSwitch[r.name]);
    return { batCap, powerTime, baseSec, needPower, realNeed, enabledRates };
}

function buildFractionMap(enabledRates) {
    const map = new Map();
    const enabledSet = new Set(enabledRates.map(r => r.name));
    const visited = new Map();
    function dfs(num, den, names, depth) {
        const key = `${num}/${den}`;
        if (visited.has(key) && visited.get(key) <= depth) return;
        visited.set(key, depth);
        const baseF = getBaseFormula(names, enabledSet);
        const existing = map.get(key);
        if (!existing || existing.steps > depth) map.set(key, { formula: baseF.formula, steps: depth });
        if (depth >= MAX_STEP) return;
        for (const rate of enabledRates) {
            const newNum = num * rate.numerator;
            const newDen = den * rate.denominator;
            const simp = simplifyFraction(newNum, newDen);
            dfs(simp.num, simp.den, [...names, rate.name], depth + 1);
        }
    }
    dfs(1, 1, [], 0);
    if (!map.has('1/1')) map.set('1/1', { formula: '1', steps: 0 });
    return map;
}

function computeSolutions(inputs) {
    const { batCap, powerTime, baseSec, realNeed, enabledRates } = inputs;
    if (realNeed <= 0) return { slim: [], steps: [], globalBestSol: null };
    const enabledSet = new Set(enabledRates.map(r => r.name));
    const stepBest = new Map();
    const visited = new Map();
    const leftConst = powerTime * batCap;
    const rightConst = realNeed * baseSec;

    function dfs(currentNum, currentDen, names, depth) {
        const key = `${currentNum}/${currentDen}`;
        if (visited.has(key) && visited.get(key) <= depth) return;
        visited.set(key, depth);
        if (leftConst * currentNum < rightConst * currentDen) return;
        const power = (leftConst * currentNum) / (baseSec * currentDen);
        const surplus = power - realNeed;
        const steps = depth;
        const baseF = getBaseFormula(names, enabledSet);
        const sec = (baseSec * currentDen) / currentNum;
        const sol = { formula: baseF.formula, sec, power, surplus: Math.round(surplus), steps };
        const old = stepBest.get(steps);
        if (!old || sol.surplus < old.surplus || (sol.surplus === old.surplus && sol.steps < old.steps)) stepBest.set(steps, sol);
        if (Math.abs(surplus) < 1e-9) return;
        if (depth >= MAX_STEP) return;
        for (const rate of enabledRates) {
            const newNum = currentNum * rate.numerator;
            const newDen = currentDen * rate.denominator;
            const simp = simplifyFraction(newNum, newDen);
            dfs(simp.num, simp.den, [...names, rate.name], depth + 1);
        }
    }
    dfs(1, 1, [], 0);

    if (stepBest.size === 0) {
        const defSec = baseSec;
        const defPower = (powerTime * batCap) / baseSec;
        const defSurplus = Math.round(defPower - realNeed);
        stepBest.set(0, { formula: '1', sec: defSec, power: defPower, surplus: defSurplus, steps: 0 });
    }
    const entries = [...stepBest.entries()].sort((a, b) => a[0] - b[0]);
    const slim = [], steps = [];
    let prevSurplus = Infinity;
    for (const [step, sol] of entries) {
        if (sol.surplus < prevSurplus) {
            slim.push(sol);
            steps.push(step);
            prevSurplus = sol.surplus;
        }
    }
    const globalBestSol = slim.reduce((best, cur) =>
        (cur.surplus < best.surplus || (cur.surplus === best.surplus && cur.steps < best.steps)) ? cur : best
    );
    return { slim, steps, globalBestSol };
}

function fullRecalc() {
    const inputs = getInputs();
    fractionMap = buildFractionMap(inputs.enabledRates);
    const { slim, steps, globalBestSol } = computeSolutions(inputs);
    allSolutions = slim;
    stepList = steps;
    globalBest = globalBestSol;
    if (!isManual) targetStep = globalBest ? globalBest.steps : 0;
    else if (!stepList.includes(targetStep)) targetStep = stepList.reduce((prev, curr) => Math.abs(curr - targetStep) < Math.abs(prev - targetStep) ? curr : prev);
    refreshUI(inputs);
    if (window.refreshManualCalc) window.refreshManualCalc();
}

function refreshUI(inputs) {
    const { realNeed } = inputs;
    const bestDiv = document.getElementById('bestResult');
    if (realNeed <= 0) {
        document.getElementById('stepNum').textContent = '0';
        document.getElementById('formulaText').textContent = '1';
        bestDiv.innerHTML = `
            <span class="ok">✅ 无需供电</span><br>
            <span class="gray">🎯 最佳倍率公式：1</span><br>
            <span class="gray">🎯 最佳发电功率：200.00（含基地200发电功率）</span><br>
            <hr>
            <span class="gray">🔹 发电功率：200.00（含基地200发电功率）</span><br>
            <span class="gray">🔹 富余电量：0.00</span><br>
            <span class="gray">🔹 传送带运输间隔：0.00 秒</span>
        `;
        document.getElementById('stepMinus').disabled = true;
        document.getElementById('stepPlus').disabled = true;
        return;
    }

    document.getElementById('stepNum').textContent = targetStep;
    const curSol = allSolutions.find(s => s.steps === targetStep) || globalBest;
    if (!curSol) return;
    document.getElementById('formulaText').textContent = displayFormula(curSol.formula);

    const powerWarning = curSol.surplus <= -1 
        ? '<span class="warn">⚠️ 供电不足，无法满足用电需求！</span><br>' 
        : '';

    bestDiv.innerHTML = `
        🎯 最佳倍率公式：<strong>${displayFormula(globalBest.formula)}</strong><br>
        🎯 最佳发电功率：${(globalBest.power + 200 + 1e-9).toFixed(2)}<span class="gray">（含基地200发电功率）<br>
        <hr>
        ${powerWarning}
        🔹 发电功率：${(curSol.power + 200 + 1e-9).toFixed(2)}（含基地200发电功率）<br>
        🔹 富余电量：${(curSol.power - realNeed + 1e-9).toFixed(2)}<br>
        🔹 传送带运输间隔：${(curSol.sec + 1e-9).toFixed(2)} 秒
    `;

    const stepPlus = document.getElementById('stepPlus');
    const stepMinus = document.getElementById('stepMinus');
    const idx = stepList.indexOf(targetStep);
    stepMinus.disabled = (idx <= 0);
    stepPlus.disabled = (targetStep >= globalBest.steps);
}

document.getElementById('stepPlus').onclick = () => {
    const idx = stepList.indexOf(targetStep);
    if (idx < stepList.length - 1 && targetStep < globalBest.steps) {
        isManual = true;
        targetStep = stepList[idx + 1];
        refreshUI(getInputs());
    }
};
document.getElementById('stepMinus').onclick = () => {
    const idx = stepList.indexOf(targetStep);
    if (idx > 0) {
        isManual = true;
        targetStep = stepList[idx - 1];
        refreshUI(getInputs());
    }
};

function renderSwitch() {
    const wrap = document.getElementById('switchBtns');
    wrap.innerHTML = '';
    rateList.forEach(r => {
        const btn = document.createElement('button');
        btn.className = 'switch-btn' + (rateSwitch[r.name] ? '' : ' off');
        btn.textContent = r.name;
        btn.onclick = () => {
            rateSwitch[r.name] = !rateSwitch[r.name];
            renderSwitch();
            isManual = false;
            fullRecalc();
        };
        wrap.appendChild(btn);
    });
}

['batCap','powerTime','baseSec','needPower'].forEach(id => {
    document.getElementById(id).addEventListener('input', () => {
        isManual = false;
        fullRecalc();
    });
});

document.getElementById('needUp').addEventListener('click', () => {
    const input = document.getElementById('needPower');
    const current = parseInputValue(input.value);
    input.value = Math.max(0, current + 100);
    isManual = false;
    fullRecalc();
});
document.getElementById('needDown').addEventListener('click', () => {
    const input = document.getElementById('needPower');
    const current = parseInputValue(input.value);
    input.value = Math.max(0, current - 100);
    isManual = false;
    fullRecalc();
});

document.getElementById('foldManualBtn').onclick = function() {
    const wrap = document.getElementById('manualWrap');
    const show = wrap.style.display !== 'block';
    wrap.style.display = show ? 'block' : 'none';
    this.textContent = show ? '📐 收起手动计算' : '📐 展开手动计算';
};

// 手动计算面板
(function() {
    const resDiv = document.getElementById('result');
    const manualFormulaEl = document.getElementById('manualFormulaText');
    const manualStepEl = document.getElementById('manualStepNum');
    let manualNames = [];

    function mergeProduct() {
        let n = 1, d = 1;
        for (const name of manualNames) {
            const r = rateList.find(r => r.name === name);
            if (r) { n *= r.numerator; d *= r.denominator; }
        }
        return simplifyFraction(n, d);
    }

    function refreshManual() {
        const inputs = getInputs();
        const { batCap, powerTime, baseSec, realNeed } = inputs;
        if (realNeed <= 0) {
            manualFormulaEl.textContent = '1';
            manualStepEl.textContent = '0';
            resDiv.innerHTML = `
                <span class="ok">✅ 无需供电</span><br>
                <span class="gray">🔹 发电功率：200.00（含基地200发电功率）</span><br>
                <span class="gray">🔹 富余电量：0.00</span><br>
                <span class="gray">🔹 传送带运输间隔：0.00 秒</span>
            `;
            return;
        }

        const { num, den } = mergeProduct();
        const key = `${num}/${den}`;
        const optimal = fractionMap.get(key);

        let formula, steps;
        if (optimal) {
            formula = optimal.formula;
            steps = optimal.steps;
            manualNames = formula === '1' ? [] : formula.split(' × ').filter(n => n !== '1');
        } else {
            formula = '1';
            steps = 0;
            manualNames = [];
        }

        manualFormulaEl.textContent = displayFormula(formula);
        manualStepEl.textContent = steps;

        const totalVal = num / den;
        const sec = baseSec / totalVal;
        const power = (powerTime * batCap * num) / (baseSec * den);
        const surplus = power - realNeed;

        const statusHtml = (surplus > -1)
            ? '<span class="ok">✅ 供电充足</span><br>'
            : '<span class="warn">⚠️ 供电不足，无法满足用电需求！</span><br>';

        resDiv.innerHTML = `
            ${statusHtml}
            🔹 发电功率：${(power + 200 + 1e-9).toFixed(2)}<span class="gray">（含基地200发电功率）<br>
            🔹 富余电量：${(surplus + 1e-9).toFixed(2)}<br>
            🔹 传送带运输间隔：${(sec + 1e-9).toFixed(2)} 秒
        `;
    }

    window.refreshManualCalc = refreshManual;

    document.querySelectorAll('.rate-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            manualNames.push(btn.dataset.name);
            refreshManual();
        });
    });
    document.getElementById('backBtn').addEventListener('click', () => {
        if (manualNames.length === 0) return;
        if (manualNames.length === 1) manualNames = [];
        else manualNames.pop();
        refreshManual();
    });
    document.getElementById('resetBtn').addEventListener('click', () => {
        manualNames = [];
        refreshManual();
    });
    refreshManual();
})();

renderSwitch();
fullRecalc();
</script>
</body>
</html>
